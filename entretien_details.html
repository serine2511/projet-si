<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails de l'entretien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <h1>Détails de l'entretien</h1>

        <table class="table table-dark">
            <tr>
                <th>Type d'entretien</th>
                <td>{{ entretien.type_entretien }}</td>
            </tr>
            <tr>
                <th>Recruteur</th>
                <td>{{ entretien.recruteur }}</td>
            </tr>
            <tr>
                <th>Date</th>
                <td>{{ entretien.date_entretien }}</td>
            </tr>
            <tr>
                <th>Heure</th>
                <td>{{ entretien.heure }}</td>
            </tr>
            <tr>
                <th>Décision</th>
                <td>{{ entretien.decision }}</td>
            </tr>
        </table>

        <a href="{% url 'liste_candidature' %}" class="btn btn-primary">Retour à la liste des candidatures</a>
    </div>
</body>
</html>
