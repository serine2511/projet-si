<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inscrire offre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <h1>{{ conge.id|default:"inscrire offre" }}</h1>
        <form method="POST" class="bg-dark p-4 rounded" enctype="multipart/form-data" >
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Inscrit</button>
            <a href="{% url 'liste_offre' %}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</body>
</html>
